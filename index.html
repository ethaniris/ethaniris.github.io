<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>老蕭專業24H線上花店</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
      /* ===== Base ===== */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        font-family: system-ui, -apple-system, "Noto Sans TC";
        margin: 0;
        background: #f6f7fb;
      }
      .wrap {
        max-width: 720px;
        margin: 0 auto;
        padding: 20px;
      }
      .card {
        background: #fff;
        border-radius: 16px;
        padding: 18px;
        box-shadow: 0 6px 24px rgba(0, 0, 0, 0.06);
      }
      .card.theme-sad {
        background: #fffdfd;
        border: 1px solid #f0e6ee;
      }

      h1 {
        font-size: 20px;
        margin: 0 0 12px;
      }
      label {
        display: block;
        font-size: 13px;
        margin: 12px 0 6px;
        color: #333;
      }
      input,
      select,
      textarea {
        width: 100%;
        padding: 12px 12px;
        border: 1px solid #e2e5ee;
        border-radius: 12px;
        font-size: 15px;
        outline: none;
        background: #fff;
      }
      textarea {
        min-height: 86px;
        resize: vertical;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .row > div {
        min-width: 0;
      }

      @media (max-width: 520px) {
        .row {
          grid-template-columns: 1fr;
        }
      }

      input[type="date"] {
        display: block;
        max-width: 100%;
        width: 100%;
        min-width: 0;
        -webkit-appearance: none;
        appearance: none;
      }

      .muted {
        color: #666;
        font-size: 12px;
        margin-top: 8px;
      }

      .btn {
        width: 100%;
        border: 0;
        border-radius: 14px;
        padding: 14px 14px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
      }
      .btn.primary {
        background: #111;
        color: #fff;
        margin-top: 14px;
      }
      .btn.ghost {
        background: #fff;
        border: 1px solid #e2e5ee;
        margin-top: 10px;
      }

      .pill {
        display: inline-block;
        padding: 6px 10px;
        border-radius: 999px;
        background: #f0f2f8;
        font-size: 12px;
      }

      /* ===== Toggle ===== */
      .toggle {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin: 12px 0 14px;
        background: #f0f2f8;
        padding: 6px;
        border-radius: 14px;
      }
      .toggle button {
        border: 0;
        border-radius: 12px;
        padding: 12px 10px;
        font-size: 15px;
        font-weight: 800;
        cursor: pointer;
        background: transparent;
      }
      .toggle button.happy {
        color: #0b6b3a;
      }
      .toggle button.sad {
        color: #7a1f3d;
      }
      .toggle button:not(.active) {
        opacity: 0.55;
      }
      .toggle button.active {
        opacity: 1;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
      }
      .toggle button.happy.active {
        background: rgba(11, 107, 58, 0.08);
      }
      .toggle button.sad.active {
        background: rgba(122, 31, 61, 0.08);
      }

      /* ===== Theme differences ===== */
      body.theme-happy {
        background: #f6f7fb;
      }
      body.theme-sad {
        background: #f6f4f7;
      }

      .only-happy {
        display: none;
      }
      .only-sad {
        display: none;
      }
      body.theme-happy .only-happy {
        display: block;
      }
      body.theme-sad .only-sad {
        display: block;
      }

      /* ===== Items (Products) ===== */
      .item-line {
        position: relative;
        margin-top: 10px;
      }
      .item-meta {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        margin-top: 6px;
        font-size: 12px;
        color: #666;
      }
      .item-remove {
        position: absolute;
        top: 0;
        right: 0;
        border: 1px solid #e2e5ee;
        background: #fff;
        border-radius: 10px;
        padding: 6px 10px;
        cursor: pointer;
        font-weight: 800;
      }
      .add-more {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-top: 12px;
        border: 1px dashed #cfd5e6;
        background: #fff;
        border-radius: 14px;
        padding: 12px 12px;
        cursor: pointer;
        font-weight: 800;
      }
      .add-more .plus {
        width: 26px;
        height: 26px;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid #e2e5ee;
        font-size: 18px;
        line-height: 1;
      }

      .total-box {
        margin-top: 12px;
        padding: 12px;
        border-radius: 14px;
        background: #f7f8fc;
        border: 1px solid #eef0f6;
        font-weight: 800;
        display: flex;
        justify-content: space-between;
        gap: 10px;
      }
    </style>
  </head>

  <body class="theme-happy">
    <div class="wrap">
      <div class="card theme-happy" id="formCard">
        <div class="pill" id="orderPill">訂單：讀取中…</div>
        <h1>訂購資料</h1>

        <!-- Toggle -->
        <div class="toggle" role="tablist" aria-label="用途選擇">
          <button type="button" id="btnHappy" class="happy active">
            喜事用花
          </button>
          <button type="button" id="btnSad" class="sad">喪事用花</button>
        </div>
        <input type="hidden" id="occasionType" value="happy" />

        <div class="row">
          <div>
            <label>訂購人姓名</label>
            <input id="buyerName" autocomplete="name" required />
          </div>
          <div>
            <label>連絡電話</label>
            <input
              id="buyerPhone"
              inputmode="tel"
              autocomplete="tel"
              required
            />
          </div>
        </div>

        <label id="nameLabel">收花人 / 主角姓名</label>
        <input id="deceasedName" required />

        <!-- 喪事 -->
        <div class="row only-sad">
          <div>
            <label>告別式日期</label>
            <input id="funeralDate" type="date" />
          </div>
          <div>
            <label>告別式地點</label>
            <input id="funeralLocation" />
          </div>
        </div>

        <!-- 喜事 -->
        <div class="row only-happy">
          <div>
            <label>送達日期</label>
            <input id="deliveryDate" type="date" />
          </div>
          <div>
            <label>送達地點</label>
            <input id="customerAddress" autocomplete="street-address" />
          </div>
        </div>

        <!-- ===== Products (dynamic items) ===== -->
        <label>訂購品項</label>
        <div id="items"></div>

        <button type="button" class="add-more" id="addItemBtn">
          <span class="plus">+</span>
          訂購其他品項
        </button>

        <div class="total-box">
          <span>合計</span>
          <span id="grandTotal">NT$0</span>
        </div>

        <!-- ===== 祝賀目的 / 喪事題詞 ===== -->
        <label id="purposeLabel">祝賀目的</label>
        <select id="purposeSelect" required></select>

        <label id="purposeOtherLabel">其他（自填）</label>
        <input
          id="purposeOther"
          placeholder="其他祝賀目的（自填）"
          autocomplete="off"
        />

        <label>下款（公司行號/稱謂+職稱+姓名）</label>
        <textarea
          id="signText"
          placeholder="例：OO公司 敬賀 / OO董事長 OOOO 敬賀"
        ></textarea>

        <label>備註</label>
        <textarea
          id="remark"
          placeholder="例如：特別注意事項、代寫卡片內容…（可留空）"
        ></textarea>

        <div class="row">
          <div>
            <label>是否開立收據</label>
            <select id="needReceipt">
              <option value="no">否</option>
              <option value="yes">是</option>
            </select>
          </div>
          <div>
            <label>收據抬頭</label>
            <input id="receiptTitle" placeholder="個人/公司名稱" />
          </div>
        </div>

        <label>收據地址</label>
        <input id="receiptAddr" placeholder="若不需收據可留空" />

        <label>付款方式</label>
        <select id="payMethod">
          <option value="linepay">LINE Pay</option>
          <option value="card">信用卡</option>
          <option value="wire">匯款</option>
        </select>

        <button class="btn primary" id="submitBtn">送出並前往付款</button>
        <button class="btn ghost" id="cancelBtn">取消</button>

        <div class="muted">
          提醒：請勿在表單內填寫過多敏感個資。送出後可於聊天室收到訂單確認。
        </div>
      </div>
    </div>

    <script>
      const LIFF_ID = "2008383838-vLABV8zo"; // 換成你的
      const params = new URLSearchParams(location.search);
      const orderId = params.get("orderId") || "";
      document.getElementById("orderPill").textContent = orderId
        ? `訂單：${orderId}`
        : "訂單：未帶入";

      // ===== Products config =====
      const PRODUCTS = [
        { name: "精選高架花籃 (1500型)", price: 1500 },
        { name: "莊重高架花籃 (2500型)", price: 2500 },
        { name: "典雅高架花籃 (3500型)", price: 3500 },
        { name: "豪華高架花籃 (4500型)", price: 4500 },
        { name: "頂級尊榮巨型花籃 (18000型)", price: 18000 },
      ];

      const itemsEl = document.getElementById("items");
      const addItemBtn = document.getElementById("addItemBtn");
      const grandTotalEl = document.getElementById("grandTotal");

      function formatNTD(n) {
        const x = Number(n) || 0;
        return "NT$" + x.toLocaleString("zh-TW");
      }

      function buildProductSelect() {
        const sel = document.createElement("select");
        sel.className = "product-select";
        sel.required = true;

        const opt0 = document.createElement("option");
        opt0.value = "";
        opt0.textContent = "請選擇品項";
        opt0.disabled = true;
        opt0.selected = true;
        sel.appendChild(opt0);

        PRODUCTS.forEach((p, idx) => {
          const opt = document.createElement("option");
          opt.value = String(idx);
          opt.textContent = `${p.name}`;
          sel.appendChild(opt);
        });

        return sel;
      }

      function buildQtySelect() {
        const sel = document.createElement("select");
        sel.className = "qty-select";
        sel.required = true;

        for (let i = 1; i <= 10; i++) {
          const opt = document.createElement("option");
          opt.value = String(i);
          opt.textContent = `${i}`;
          sel.appendChild(opt);
        }
        return sel;
      }

      function updateLineAndTotal() {
        let grand = 0;

        document.querySelectorAll(".item-line").forEach((line) => {
          const pSel = line.querySelector(".product-select");
          const qSel = line.querySelector(".qty-select");
          const unitEl = line.querySelector(".unit-price");
          const lineEl = line.querySelector(".line-total");

          const pIdx = Number(pSel.value);
          const qty = Number(qSel.value) || 1;

          if (!Number.isFinite(pIdx) || !PRODUCTS[pIdx]) {
            unitEl.textContent = "單價：—";
            lineEl.textContent = "小計：—";
            return;
          }

          const unit = PRODUCTS[pIdx].price;
          const lineTotal = unit * qty;

          unitEl.textContent = `單價：${formatNTD(unit)}`;
          lineEl.textContent = `小計：${formatNTD(lineTotal)}`;

          grand += lineTotal;
        });

        grandTotalEl.textContent = formatNTD(grand);
      }

      function addItem(prefillIndex = 0) {
        const wrap = document.createElement("div");
        wrap.className = "item-line";

        const row = document.createElement("div");
        row.className = "row";

        const col1 = document.createElement("div");
        const col2 = document.createElement("div");

        const productLabel = document.createElement("label");
        productLabel.textContent = "品項";
        const productSelect = buildProductSelect();

        const qtyLabel = document.createElement("label");
        qtyLabel.textContent = "數量";
        const qtySelect = buildQtySelect();

        // remove button (可刪除，不想要就把這段跟事件移除)
        const rm = document.createElement("button");
        rm.type = "button";
        rm.className = "item-remove";
        rm.textContent = "✕";
        rm.addEventListener("click", () => {
          wrap.remove();
          if (document.querySelectorAll(".item-line").length === 0) {
            addItem(0);
          }
          updateLineAndTotal();
        });

        col1.appendChild(productLabel);
        col1.appendChild(productSelect);
        col2.appendChild(qtyLabel);
        col2.appendChild(qtySelect);

        row.appendChild(col1);
        row.appendChild(col2);

        const meta = document.createElement("div");
        meta.className = "item-meta";
        const unit = document.createElement("span");
        unit.className = "unit-price";
        unit.textContent = "單價：—";
        const lineTotal = document.createElement("span");
        lineTotal.className = "line-total";
        lineTotal.textContent = "小計：—";
        meta.appendChild(unit);
        meta.appendChild(lineTotal);

        wrap.appendChild(rm);
        wrap.appendChild(row);
        wrap.appendChild(meta);

        // events
        productSelect.addEventListener("change", updateLineAndTotal);
        qtySelect.addEventListener("change", updateLineAndTotal);

        itemsEl.appendChild(wrap);

        // prefill default first row: pick first product
        // 你如果想預設「不要先選」，就把這段註解掉
        productSelect.value = String(prefillIndex);
        updateLineAndTotal();
      }

      addItemBtn.addEventListener("click", () => addItem(0));

      // init with 1 line item
      addItem(0);

      // ===== Toggle logic =====
      const bodyEl = document.body;
      const cardEl = document.getElementById("formCard");
      const btnHappy = document.getElementById("btnHappy");
      const btnSad = document.getElementById("btnSad");
      const occasionTypeEl = document.getElementById("occasionType");
      const nameLabel = document.getElementById("nameLabel");
      const signText = document.getElementById("signText");
      const funeralDate = document.getElementById("funeralDate");
      const funeralLocation = document.getElementById("funeralLocation");
      const deliveryDate = document.getElementById("deliveryDate");
      const deliveryLocation = document.getElementById("deliveryLocation");

      // ===== Purpose / Phrase options =====
      const purposeLabel = document.getElementById("purposeLabel");
      const purposeSelect = document.getElementById("purposeSelect");
      const purposeOther = document.getElementById("purposeOther");

      const PURPOSE_HAPPY = ["開幕誌慶", "喬遷誌慶", "榮陞誌喜", "新婚誌喜"];
      const PURPOSE_SAD = ["音容宛在", "駕鶴西歸", "道範長存", "淑德永昭"];

      function renderPurposeOptions(type) {
        const isHappy = type === "happy";
        purposeLabel.textContent = isHappy ? "祝賀目的" : "喪事題詞";
        purposeOther.placeholder = isHappy
          ? "其他祝賀目的（自填）"
          : "其他喪事題詞（自填）";

        const list = isHappy ? PURPOSE_HAPPY : PURPOSE_SAD;

        purposeSelect.innerHTML = "";

        const opt0 = document.createElement("option");
        opt0.value = "";
        opt0.textContent = isHappy ? "請選擇祝賀目的" : "請選擇喪事題詞";
        opt0.disabled = true;
        opt0.selected = true;
        purposeSelect.appendChild(opt0);

        for (const text of list) {
          const opt = document.createElement("option");
          opt.value = text;
          opt.textContent = text;
          purposeSelect.appendChild(opt);
        }

        const optOther = document.createElement("option");
        optOther.value = "__other__";
        optOther.textContent = "其他（自填）";
        purposeSelect.appendChild(optOther);

        purposeSelect.value = "";
        purposeOther.value = "";
        purposeOther.disabled = true;
        purposeOther.required = false;
      }

      purposeSelect.addEventListener("change", () => {
        const isOther = purposeSelect.value === "__other__";
        purposeOther.disabled = !isOther;
        purposeOther.required = isOther;
        if (!isOther) purposeOther.value = "";
      });

      function setOccasion(type) {
        const isHappy = type === "happy";

        bodyEl.classList.toggle("theme-happy", isHappy);
        bodyEl.classList.toggle("theme-sad", !isHappy);
        cardEl.classList.toggle("theme-sad", !isHappy);

        btnHappy.classList.toggle("active", isHappy);
        btnSad.classList.toggle("active", !isHappy);

        occasionTypeEl.value = type;

        nameLabel.textContent = isHappy ? "收花人 / 主角姓名" : "往生大德";

        signText.placeholder = isHappy
          ? "例：OO公司 敬賀 / OO董事長 OOOO 敬賀"
          : "例：OO公司 敬輓 / OO董事長 OOOO 敬輓";

        if (funeralDate && funeralLocation) {
          funeralDate.required = !isHappy;
          funeralLocation.required = !isHappy;
          if (isHappy) {
            funeralDate.value = "";
            funeralLocation.value = "";
          }
        }

        if (deliveryDate && deliveryLocation) {
          deliveryDate.required = isHappy;
          deliveryLocation.required = isHappy;
          if (!isHappy) {
            deliveryDate.value = "";
            deliveryLocation.value = "";
          }
        }

        renderPurposeOptions(type);
      }

      btnHappy.addEventListener("click", () => setOccasion("happy"));
      btnSad.addEventListener("click", () => setOccasion("sad"));
      setOccasion("happy");

      // ===== LIFF init & submit =====
      async function init() {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) liff.login();

        // read orderId from URL
        const params = new URLSearchParams(location.search);
        const orderId = params.get("orderId") || "";

        // optional: show pill
        document.getElementById("orderPill").textContent = orderId
          ? `訂單：${orderId}`
          : "訂單：未帶入";

        // load prefill
        await loadPrefill(orderId);
      }
      async function loadPrefill(orderId) {
        if (!orderId) return;

        const url = `https://line-flower-shop-f54f9c20b157.herokuapp.com/api/order-context?orderId=${encodeURIComponent(
          orderId
        )}`;

        try {
          const resp = await fetch(url); // <-- no headers, no credentials
          if (!resp.ok) return;

          const ctx = await resp.json();

          if (ctx.customer_name)
            document.getElementById("buyerName").value = ctx.customer_name;
          if (ctx.customer_phone)
            document.getElementById("buyerPhone").value = ctx.customer_phone;

          const addrEl = document.getElementById("customerAddress");
          if (addrEl && ctx.customer_address)
            addrEl.value = ctx.customer_address;
        } catch (e) {
          console.log("prefill fetch failed:", e);
        }
      }

      function collectItems() {
        const lines = Array.from(document.querySelectorAll(".item-line"));
        const items = [];

        for (const line of lines) {
          const pSel = line.querySelector(".product-select");
          const qSel = line.querySelector(".qty-select");

          const pIdx = Number(pSel.value);
          const qty = Number(qSel.value) || 1;

          if (!Number.isFinite(pIdx) || !PRODUCTS[pIdx]) continue;

          const p = PRODUCTS[pIdx];
          const lineTotal = p.price * qty;

          items.push({
            name: p.name,
            unitPrice: p.price,
            qty,
            lineTotal,
          });
        }

        return items;
      }

      async function submit() {
        const profile = await liff.getProfile();

        const items = collectItems();
        if (items.length === 0) {
          alert("請至少選擇一個訂購品項");
          return;
        }

        const purposeText =
          purposeSelect.value === "__other__"
            ? purposeOther.value.trim()
            : purposeSelect.value;

        if (!purposeText) {
          alert("請選擇祝賀目的 / 喪事題詞（或選其他自填）");
          return;
        }

        const data = {
          orderId,
          lineUserId: profile.userId,

          occasionType: occasionTypeEl.value,

          buyerName: document.getElementById("buyerName").value.trim(),
          buyerPhone: document.getElementById("buyerPhone").value.trim(),
          deceasedName: document.getElementById("deceasedName").value.trim(),

          funeralDate: funeralDate?.value || "",
          funeralLocation: funeralLocation?.value.trim() || "",

          deliveryDate: deliveryDate?.value || "",
          deliveryLocation: deliveryLocation?.value.trim() || "",

          // NEW: dynamic items
          items,
          grandTotal: items.reduce(
            (sum, it) => sum + (Number(it.lineTotal) || 0),
            0
          ),

          signText: signText.value.trim(),
          remark: document.getElementById("remark").value.trim(),

          needReceipt: document.getElementById("needReceipt").value,
          receiptTitle: document.getElementById("receiptTitle").value.trim(),
          receiptAddr: document.getElementById("receiptAddr").value.trim(),
          payMethod: document.getElementById("payMethod").value,

          purposeSelect: purposeSelect.value,
          purposeOther: purposeOther.value.trim(),
          purposeText,
        };

        const resp = await fetch("/api/checkout", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });

        if (!resp.ok) {
          alert("送出失敗，請稍後再試");
          return;
        }

        const result = await resp.json();
        if (result.nextUrl) {
          location.href = result.nextUrl;
        } else {
          alert(result.message || "已送出");
          if (liff.isInClient()) liff.closeWindow();
        }
      }

      document.getElementById("submitBtn").addEventListener("click", submit);
      document.getElementById("cancelBtn").addEventListener("click", () => {
        if (liff.isInClient()) liff.closeWindow();
        else history.back();
      });

      init().catch((err) => alert("LIFF 初始化失敗：" + err));
    </script>
  </body>
</html>
