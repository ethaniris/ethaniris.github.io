<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>老蕭專業24H線上花店</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
      body {
        font-family: system-ui, -apple-system, "Noto Sans TC";
        margin: 0;
        background: #f6f7fb;
      }
      .wrap {
        max-width: 720px;
        margin: 0 auto;
        padding: 20px;
      }
      .card {
        background: #fff;
        border-radius: 16px;
        padding: 18px;
        box-shadow: 0 6px 24px rgba(0, 0, 0, 0.06);
      }
      h1 {
        font-size: 20px;
        margin: 0 0 12px;
      }
      label {
        display: block;
        font-size: 13px;
        margin: 12px 0 6px;
        color: #333;
      }
      input,
      select,
      textarea {
        width: 100%;
        padding: 12px 12px;
        border: 1px solid #e2e5ee;
        border-radius: 12px;
        font-size: 15px;
        outline: none;
        background: #fff;
      }
      textarea {
        min-height: 86px;
        resize: vertical;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .muted {
        color: #666;
        font-size: 12px;
        margin-top: 8px;
      }
      .btn {
        width: 100%;
        border: 0;
        border-radius: 14px;
        padding: 14px 14px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
      }
      .btn.primary {
        background: #111;
        color: #fff;
        margin-top: 14px;
      }
      .btn.ghost {
        background: #fff;
        border: 1px solid #e2e5ee;
        margin-top: 10px;
      }
      .pill {
        display: inline-block;
        padding: 6px 10px;
        border-radius: 999px;
        background: #f0f2f8;
        font-size: 12px;
      }

      /* ===== Toggle UI ===== */
      .toggle {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin: 12px 0 14px;
        background: #f0f2f8;
        padding: 6px;
        border-radius: 14px;
      }
      .toggle button {
        border: 0;
        border-radius: 12px;
        padding: 12px 10px;
        font-size: 15px;
        font-weight: 800;
        cursor: pointer;
        background: transparent;
        color: #333;
      }
      .toggle button.active {
        background: #fff;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
      }

      /* ===== Theme differences ===== */
      body.theme-happy {
        background: #f6f7fb; /* default-ish */
      }
      body.theme-sad {
        background: #f6f4f7; /* slight tint */
      }
      .card.theme-happy {
        background: #ffffff;
      }
      .card.theme-sad {
        background: #fffdfd; /* tiny tint */
        border: 1px solid #f0e6ee;
      }

      /* Show/hide blocks */
      .only-happy {
        display: none;
      }
      .only-sad {
        display: none;
      }
      body.theme-happy .only-happy {
        display: block;
      }
      body.theme-sad .only-sad {
        display: block;
      }
      /* 1) 最重要：讓 padding/border 不會把寬度撐爆 */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      /* 2) Grid 子項目允許縮小，避免內容把格子撐開 */
      .row > div {
        min-width: 0;
      }

      /* 3) 手機螢幕時，兩欄改一欄，避免擠爆/重疊 */
      @media (max-width: 520px) {
        .row {
          grid-template-columns: 1fr;
        }
      }
      /* Fix mobile date input overflow */
      input[type="date"] {
        display: block;
        max-width: 100%;
        width: 100%;
        min-width: 0;
        -webkit-appearance: none;
        appearance: none;
      }
      /* Toggle text color difference */
      .toggle button.happy {
        color: #0b6b3a; /* 綠一點，喜事 */
      }
      .toggle button.sad {
        color: #7a1f3d; /* 紫紅一點，喪事 */
      }

      /* inactive 變淡一點 */
      .toggle button:not(.active) {
        opacity: 0.55;
      }

      /* active 更清楚 */
      .toggle button.active {
        opacity: 1;
      }

      /* optional: active 背景也帶一點淡淡色 */
      .toggle button.happy.active {
        background: rgba(11, 107, 58, 0.08);
      }
      .toggle button.sad.active {
        background: rgba(122, 31, 61, 0.08);
      }
    </style>
  </head>
  <body class="theme-happy">
    <div class="wrap">
      <div class="card theme-happy" id="formCard">
        <div class="pill" id="orderPill">訂單：讀取中…</div>
        <h1>高架花籃訂購資料</h1>

        <!-- ===== Toggle (喜事 / 喪事) ===== -->
        <div class="toggle" role="tablist" aria-label="用途選擇">
          <button type="button" id="btnHappy" class="active">喜事用花</button>
          <button type="button" id="btnSad">喪事用花</button>
        </div>
        <input type="hidden" id="occasionType" value="happy" />

        <div class="row">
          <div>
            <label>訂購人姓名</label>
            <input id="buyerName" autocomplete="name" required />
          </div>
          <div>
            <label>連絡電話</label>
            <input
              id="buyerPhone"
              inputmode="tel"
              autocomplete="tel"
              required
            />
          </div>
        </div>

        <!-- Switchable label -->
        <label id="nameLabel">收花人 / 主角姓名</label>
        <input id="deceasedName" required />

        <!-- 喪事：告別式日期/地點 -->
        <div class="row only-sad" id="sadDateLocationRow">
          <div>
            <label id="dateLabel">告別式日期</label>
            <input id="funeralDate" type="date" />
          </div>
          <div>
            <label id="locLabel">告別式地點</label>
            <input id="funeralLocation" />
          </div>
        </div>

        <!-- 喜事：送達日期/地點（你若不需要可刪掉這整段 only-happy） -->
        <div class="row only-happy" id="happyDateLocationRow">
          <div>
            <label>送達日期</label>
            <input id="deliveryDate" type="date" />
          </div>
          <div>
            <label>送達地點</label>
            <input id="deliveryLocation" />
          </div>
        </div>

        <div class="row">
          <div>
            <label>產品</label>
            <input value="高架花籃" disabled />
          </div>
          <div>
            <label>數量（對）</label>
            <select id="qtyPairs">
              <option value="1">1 對（NT$2000）</option>
              <option value="2">2 對（NT$4000）</option>
              <option value="3">3 對（NT$6000）</option>
            </select>
          </div>
        </div>

        <label>下款（公司行號/稱謂+職稱+姓名）</label>
        <textarea
          id="signText"
          placeholder="例：OO公司 敬賀 / OO董事長 OOOO 敬賀"
        ></textarea>

        <div class="row">
          <div>
            <label>是否開立收據</label>
            <select id="needReceipt">
              <option value="no">否</option>
              <option value="yes">是</option>
            </select>
          </div>
          <div>
            <label>收據抬頭</label>
            <input id="receiptTitle" placeholder="個人/公司名稱" />
          </div>
        </div>

        <label>收據地址</label>
        <input id="receiptAddr" placeholder="若不需收據可留空" />

        <label>付款方式</label>
        <select id="payMethod">
          <option value="linepay">LINE Pay</option>
          <option value="card">信用卡</option>
          <option value="wire">匯款</option>
        </select>

        <button class="btn primary" id="submitBtn">送出並前往付款</button>
        <button class="btn ghost" id="cancelBtn">取消</button>

        <div class="muted">
          提醒：請勿在表單內填寫過多敏感個資。送出後可於聊天室收到訂單確認。
        </div>
      </div>
    </div>

    <script>
      const LIFF_ID = "2008383838-vLABV8zo"; // 換成你的
      const params = new URLSearchParams(location.search);
      const orderId = params.get("orderId") || "";

      document.getElementById("orderPill").textContent = orderId
        ? `訂單：${orderId}`
        : "訂單：未帶入";

      // ===== Toggle logic =====
      const bodyEl = document.body;
      const cardEl = document.getElementById("formCard");

      const btnHappy = document.getElementById("btnHappy");
      const btnSad = document.getElementById("btnSad");
      const occasionTypeEl = document.getElementById("occasionType");

      const nameLabel = document.getElementById("nameLabel");
      const signText = document.getElementById("signText");

      const funeralDate = document.getElementById("funeralDate");
      const funeralLocation = document.getElementById("funeralLocation");

      const deliveryDate = document.getElementById("deliveryDate");
      const deliveryLocation = document.getElementById("deliveryLocation");

      function setOccasion(type) {
        const isHappy = type === "happy";

        // theme
        bodyEl.classList.toggle("theme-happy", isHappy);
        bodyEl.classList.toggle("theme-sad", !isHappy);
        cardEl.classList.toggle("theme-happy", isHappy);
        cardEl.classList.toggle("theme-sad", !isHappy);

        // buttons
        btnHappy.classList.toggle("active", isHappy);
        btnSad.classList.toggle("active", !isHappy);

        // hidden value
        occasionTypeEl.value = type;

        // text differences
        nameLabel.textContent = isHappy ? "收花人 / 主角姓名" : "往生大德";

        // placeholder differences
        signText.placeholder = isHappy
          ? "例：OO公司 敬賀 / OO董事長 OOOO 敬賀"
          : "例：OO公司 敬輓 / OO董事長 OOOO 敬輓";

        // required rules
        if (funeralDate && funeralLocation) {
          funeralDate.required = !isHappy;
          funeralLocation.required = !isHappy;
          if (isHappy) {
            funeralDate.value = "";
            funeralLocation.value = "";
          }
        }

        if (deliveryDate && deliveryLocation) {
          deliveryDate.required = isHappy;
          deliveryLocation.required = isHappy;
          if (!isHappy) {
            deliveryDate.value = "";
            deliveryLocation.value = "";
          }
        }
      }

      btnHappy.addEventListener("click", () => setOccasion("happy"));
      btnSad.addEventListener("click", () => setOccasion("sad"));

      // default
      setOccasion("happy");

      async function init() {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) liff.login();
      }

      async function submit() {
        const profile = await liff.getProfile();

        const data = {
          orderId,
          lineUserId: profile.userId,

          occasionType: document.getElementById("occasionType").value,

          buyerName: document.getElementById("buyerName").value.trim(),
          buyerPhone: document.getElementById("buyerPhone").value.trim(),

          // NOTE: keep your original field id to avoid changing backend,
          // but content is either 收花人/主角 or 往生大德
          deceasedName: document.getElementById("deceasedName").value.trim(),

          funeralDate: document.getElementById("funeralDate")?.value || "",
          funeralLocation:
            document.getElementById("funeralLocation")?.value.trim() || "",

          deliveryDate: document.getElementById("deliveryDate")?.value || "",
          deliveryLocation:
            document.getElementById("deliveryLocation")?.value.trim() || "",

          product: "高架花籃",
          qtyPairs: Number(document.getElementById("qtyPairs").value),
          signText: document.getElementById("signText").value.trim(),

          needReceipt: document.getElementById("needReceipt").value,
          receiptTitle: document.getElementById("receiptTitle").value.trim(),
          receiptAddr: document.getElementById("receiptAddr").value.trim(),
          payMethod: document.getElementById("payMethod").value,
        };

        const resp = await fetch("/api/checkout", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });

        if (!resp.ok) {
          alert("送出失敗，請稍後再試");
          return;
        }

        const result = await resp.json();
        if (result.nextUrl) {
          location.href = result.nextUrl;
        } else {
          alert(result.message || "已送出");
          if (liff.isInClient()) liff.closeWindow();
        }
      }

      document.getElementById("submitBtn").addEventListener("click", submit);
      document.getElementById("cancelBtn").addEventListener("click", () => {
        if (liff.isInClient()) liff.closeWindow();
        else history.back();
      });

      init().catch((err) => alert("LIFF 初始化失敗：" + err));
    </script>
  </body>
</html>
